services:
  db:
    image: postgres:16-alpine
    container_name: therapy_db
    environment:
      POSTGRES_DB: therapy_center
      POSTGRES_USER: therapy_user
      POSTGRES_PASSWORD: therapy_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U therapy_user -d therapy_center"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: therapy_backend
    environment:
      DJANGO_SECRET_KEY: dev-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DB_NAME: therapy_center
      DB_USER: therapy_user
      DB_PASSWORD: therapy_pass
      DB_HOST: db
      DB_PORT: "5432"
      JWT_SECRET_KEY: dev-jwt-secret
      JWT_ACCESS_TTL_MINUTES: "30"
      JWT_REFRESH_TTL_DAYS: "7"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8010:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_USE_MOCK_API: "false"
    container_name: therapy_frontend
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  postgres_data:
